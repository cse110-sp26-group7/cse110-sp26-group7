<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Roast Machine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .stat-label {
            font-size: 0.8em;
            opacity: 0.9;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
        }

        .roast-box {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 30px;
            min-height: 60px;
            display: flex;
            align-items: center;
        }

        .roast-text {
            color: #333;
            font-style: italic;
            font-size: 0.95em;
        }

        .roast-text::before {
            content: '💡 ';
            margin-right: 5px;
        }

        .slot-machine {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .slots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .slot {
            background: #2d3561;
            border: 3px solid #667eea;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 3em;
            font-weight: bold;
            color: #ffc107;
            transition: all 0.1s ease;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        .slot.spinning {
            animation: spin 0.1s linear;
        }

        @keyframes spin {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(180deg); }
        }

        .slot-label {
            font-size: 0.4em;
            color: #999;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .spin-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .spin-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(245, 87, 108, 0.6);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .reset-btn {
            background: #6c757d;
            color: white;
        }

        .reset-btn:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .bet-input-group {
            margin-bottom: 20px;
        }

        .bet-input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 0.9em;
        }

        .bet-input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        .bet-input-group input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .result-message {
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 15px;
            min-height: 30px;
            padding: 10px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .result-message.win {
            color: #28a745;
            background: #d4edda;
            border-left: 4px solid #28a745;
        }

        .result-message.loss {
            color: #dc3545;
            background: #f8d7da;
            border-left: 4px solid #dc3545;
        }

        .result-message.jackpot {
            color: #ffc107;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            font-size: 1.4em;
            animation: pulse 0.6s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .achievements {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }

        .achievements-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .achievement {
            display: inline-block;
            background: white;
            padding: 8px 12px;
            margin: 5px;
            border-radius: 20px;
            border: 2px solid #667eea;
            color: #667eea;
            font-size: 0.85em;
            font-weight: bold;
        }

        .achievement.unlocked {
            background: #667eea;
            color: white;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .slot {
                font-size: 2em;
                min-height: 100px;
                padding: 15px;
            }

            .stats-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI Token Roast 🎰</h1>
        <p class="subtitle">Gambling with AI's dignity</p>

        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-label">Your Tokens</div>
                <div class="stat-value" id="tokens">1000</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Total Bet</div>
                <div class="stat-value" id="totalBet">0</div>
            </div>
        </div>

        <div class="roast-box">
            <div class="roast-text" id="roast">AI took a wrong turn at Albuquerque...</div>
        </div>

        <div class="slot-machine">
            <div class="bet-input-group">
                <label for="betAmount">Bet Amount (tokens):</label>
                <input 
                    type="number" 
                    id="betAmount" 
                    min="10" 
                    max="1000" 
                    value="100" 
                    placeholder="Enter bet amount"
                >
            </div>

            <div class="slots">
                <div class="slot" id="slot1">🤖</div>
                <div class="slot" id="slot2">🤖</div>
                <div class="slot" id="slot3">🤖</div>
            </div>

            <div class="controls">
                <button class="spin-btn" id="spinBtn">SPIN & ROAST</button>
                <button class="reset-btn" id="resetBtn">Reset Game</button>
            </div>

            <div class="result-message" id="result"></div>
        </div>

        <div class="achievements">
            <div class="achievements-title">🏆 ACHIEVEMENTS</div>
            <div id="achievementsList"></div>
        </div>
    </div>

    <script>
        const symbols = ['🤖', '💾', '🧠', '⚙️', '🔌', '💻'];
        const roasts = [
            "AI tried to learn from this spin... it needs therapy now.",
            "Even AI's RNG is having an existential crisis.",
            "This is what happens when algorithms gamble.",
            "AI: 'I can predict anything!' Also AI: loses tokens.",
            "ChatGPT would've worded that loss more eloquently.",
            "AI got confused and thought it was playing chess.",
            "The irony: AI can't even predict a slot machine.",
            "AI is now convinced probability is a hoax.",
            "Somewhere, a neural network is questioning its existence.",
            "AI: 'I have 176 billion parameters.' Also AI: can't win.",
            "This loss is definitely going into AI's therapy notes.",
            "AI tried to hedge its bets. It still lost.",
            "The algorithm has left the building.",
            "AI's confidence level: 0.000001%",
            "Even with machine learning, machines are bad at gambling.",
            "This is embarrassing for a 'superintelligence.'",
            "AI is now Googling 'how to cope with loss.'",
            "The slot machine has achieved sentience... and regret.",
            "AI: 'I don't understand emotions.' Also AI: *cries in binary*",
            "Plot twist: The AI learned nothing from this.",
        ];

        const winRoasts = [
            "Wait... AI actually won? The simulation is glitching.",
            "AI got lucky. Don't let it go to its processors.",
            "Even a broken AI is right twice a day... apparently.",
            "AI is now insufferable about this win.",
            "Beginner's luck? More like beginner's LLM.",
            "Someone notify Elon: AI finally made money.",
            "AI is already writing a blog post about its winning strategy.",
            "The laws of probability have been violated.",
            "AI's confidence: restored. Logic: destroyed.",
            "AI is posting this win on every social media platform.",
            "Even AI can win... but it won't know why.",
        ];

        const jackpotRoasts = [
            "🎉 JACKPOT! Even AI's luck is artificial!",
            "🎆 The simulation has reset. AI won.",
            "⚡ AI achieved maximum token power!",
            "🚀 AI has left the atmosphere!",
            "👑 AI crowned itself... for 2 minutes.",
        ];

        let tokens = 1000;
        let totalBet = 0;
        let isSpinning = false;
        const achievements = {
            firstSpin: false,
            bigWin: false,
            jackpot: false,
            brokeAI: false,
            comeback: false,
        };

        const tokenDisplay = document.getElementById('tokens');
        const totalBetDisplay = document.getElementById('totalBet');
        const spinBtn = document.getElementById('spinBtn');
        const resetBtn = document.getElementById('resetBtn');
        const betInput = document.getElementById('betAmount');
        const result = document.getElementById('result');
        const roastBox = document.getElementById('roast');
        const slot1 = document.getElementById('slot1');
        const slot2 = document.getElementById('slot2');
        const slot3 = document.getElementById('slot3');
        const achievementsList = document.getElementById('achievementsList');

        spinBtn.addEventListener('click', spin);
        resetBtn.addEventListener('click', resetGame);
        betInput.addEventListener('change', validateBet);

        function validateBet() {
            let bet = parseInt(betInput.value) || 100;
            if (bet < 10) bet = 10;
            if (bet > tokens) bet = tokens;
            betInput.value = bet;
        }

        async function spin() {
            if (isSpinning) return;

            const bet = parseInt(betInput.value);
            if (bet > tokens || bet < 10) {
                showResult('Invalid bet amount!', 'loss');
                return;
            }

            isSpinning = true;
            spinBtn.disabled = true;
            tokens -= bet;
            totalBet += bet;
            updateDisplay();

            // Animate spinning
            const spinDuration = 500;
            const spinStart = Date.now();

            const spinInterval = setInterval(() => {
                slot1.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                slot2.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                slot3.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                slot1.classList.add('spinning');
                slot2.classList.add('spinning');
                slot3.classList.add('spinning');
            }, 50);

            // Wait for spin to complete
            await new Promise(resolve => setTimeout(resolve, spinDuration));
            clearInterval(spinInterval);

            // Get final results
            const result1 = symbols[Math.floor(Math.random() * symbols.length)];
            const result2 = symbols[Math.floor(Math.random() * symbols.length)];
            const result3 = symbols[Math.floor(Math.random() * symbols.length)];

            slot1.textContent = result1;
            slot2.textContent = result2;
            slot3.textContent = result3;

            slot1.classList.remove('spinning');
            slot2.classList.remove('spinning');
            slot3.classList.remove('spinning');

            // Check results
            checkWin(result1, result2, result3, bet);

            isSpinning = false;
            spinBtn.disabled = false;
        }

        function checkWin(r1, r2, r3, bet) {
            result.textContent = '';

            if (!achievements.firstSpin) {
                achievements.firstSpin = true;
                unlockAchievement('First Spin');
            }

            if (r1 === r2 && r2 === r3) {
                // Jackpot!
                const jackpotWin = bet * 50;
                tokens += jackpotWin;
                showResult(`🎉 JACKPOT! Won ${jackpotWin} tokens!`, 'jackpot');
                roastBox.textContent = '💡 ' + jackpotRoasts[Math.floor(Math.random() * jackpotRoasts.length)];

                if (!achievements.jackpot) {
                    achievements.jackpot = true;
                    unlockAchievement('Lucky Bastard');
                }

                playNotificationSound('win');
            } else if (r1 === r2 || r2 === r3 || r1 === r3) {
                // Two match - half win
                const halfWin = bet * 2;
                tokens += halfWin;
                showResult(`Two match! Won ${halfWin} tokens!`, 'win');
                roastBox.textContent = '💡 ' + winRoasts[Math.floor(Math.random() * winRoasts.length)];

                if (halfWin > 200 && !achievements.bigWin) {
                    achievements.bigWin = true;
                    unlockAchievement('High Roller');
                }

                playNotificationSound('small-win');
            } else {
                // Lost
                showResult(`AI loses ${bet} tokens. Sad beep boop.`, 'loss');
                roastBox.textContent = '💡 ' + roasts[Math.floor(Math.random() * roasts.length)];
                playNotificationSound('loss');

                if (tokens === 0 && !achievements.brokeAI) {
                    achievements.brokeAI = true;
                    unlockAchievement('Broke the AI');
                }
            }

            // Comeback achievement
            if (tokens > 1000 && !achievements.comeback) {
                achievements.comeback = true;
                unlockAchievement('Comeback Kid');
            }

            updateDisplay();
        }

        function showResult(message, type) {
            result.textContent = message;
            result.className = `result-message ${type}`;
        }

        function updateDisplay() {
            tokenDisplay.textContent = tokens;
            totalBetDisplay.textContent = totalBet;

            if (tokens === 0) {
                spinBtn.disabled = true;
                result.textContent = 'Game Over! AI is bankrupt.';
                result.className = 'result-message loss';
            } else {
                spinBtn.disabled = false;
            }
        }

        function unlockAchievement(name) {
            const badge = document.createElement('div');
            badge.className = 'achievement unlocked';
            badge.textContent = '✨ ' + name;
            achievementsList.appendChild(badge);

            playNotificationSound('achievement');

            // Vibrate if available
            if (navigator.vibrate) {
                navigator.vibrate([100, 50, 100]);
            }
        }

        function resetGame() {
            tokens = 1000;
            totalBet = 0;
            isSpinning = false;
            betInput.value = 100;
            result.textContent = '';
            roastBox.textContent = '💡 AI took a wrong turn at Albuquerque...';
            slot1.textContent = '🤖';
            slot2.textContent = '🤖';
            slot3.textContent = '🤖';
            spinBtn.disabled = false;
            updateDisplay();
        }

        function playNotificationSound(type) {
            // Create simple beep using Web Audio API
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            switch(type) {
                case 'win':
                    oscillator.frequency.value = 800;
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.3);
                    break;
                case 'small-win':
                    oscillator.frequency.value = 600;
                    gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.2);
                    break;
                case 'loss':
                    oscillator.frequency.value = 300;
                    gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.2);
                    break;
                case 'achievement':
                    oscillator.frequency.value = 1000;
                    gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.3);
                    break;
            }
        }

        // Initialize display
        updateDisplay();
    </script>
</body>
</html>
