<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slot Machine - Money for Nothing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 100%);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), inset 0 0 30px rgba(255, 215, 0, 0.1);
            max-width: 600px;
            width: 100%;
            border: 5px solid #FFD700;
        }

        .title {
            text-align: center;
            color: #FFD700;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            animation: pulse 2s infinite;
        }

        .subtitle {
            text-align: center;
            color: #FF6B6B;
            font-size: 1.1em;
            margin-bottom: 30px;
            font-style: italic;
        }

        @keyframes pulse {
            0%, 100% {
                text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            }
            50% {
                text-shadow: 0 0 40px rgba(255, 215, 0, 0.9);
            }
        }

        .token-display {
            background: rgba(0, 0, 0, 0.5);
            border: 3px solid #00FF00;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        .token-label {
            color: #00FF00;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .token-amount {
            font-size: 3em;
            color: #FFD700;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        .tokens-icon {
            font-size: 2em;
            margin-left: 10px;
        }

        .machines-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .machine {
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            border: 3px solid #FFD700;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .machine h3 {
            color: #FFD700;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .slots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .slot {
            background: linear-gradient(145deg, #1a1a2e, #0f0f1e);
            border: 2px solid #00FF00;
            border-radius: 8px;
            padding: 15px;
            font-size: 2em;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #FFD700;
            box-shadow: inset 0 0 10px rgba(0, 255, 0, 0.2);
            transition: all 0.1s ease;
            user-select: none;
        }

        .slot.spinning {
            animation: spin 0.1s linear;
            background: linear-gradient(145deg, #FFD700, #FFA500);
            color: #000;
        }

        @keyframes spin {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .spin-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #FF6B6B, #FF4757);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(255, 75, 75, 0.4);
        }

        .spin-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 75, 75, 0.6);
        }

        .spin-button:active:not(:disabled) {
            transform: translateY(0);
        }

        .spin-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message-box {
            background: rgba(255, 107, 107, 0.2);
            border: 2px solid #FF6B6B;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .message {
            color: #FFD700;
            font-size: 1.1em;
            font-weight: bold;
            min-height: 40px;
        }

        .win-message {
            color: #00FF00;
            animation: winFlash 0.5s ease;
        }

        @keyframes winFlash {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .lose-message {
            color: #FF6B6B;
        }

        .ai-roasts {
            list-style: none;
            margin-top: 15px;
            font-size: 0.9em;
            color: #888;
            max-height: 80px;
            overflow-y: auto;
        }

        .ai-roasts li {
            margin: 5px 0;
            padding: 5px;
            border-left: 2px solid #FF6B6B;
            padding-left: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
            font-size: 0.9em;
        }

        .stat {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00FF00;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }

        .stat-label {
            color: #888;
            font-size: 0.8em;
            text-transform: uppercase;
        }

        .stat-value {
            color: #00FF00;
            font-weight: bold;
            font-size: 1.3em;
            margin-top: 5px;
        }

        .reset-button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reset-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .title {
                font-size: 1.8em;
            }

            .machines-section {
                grid-template-columns: 1fr;
            }

            .token-amount {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🎰 Money for Nothing 🤖</h1>
        <p class="subtitle">Where AI's waste your time AND your money!</p>

        <div class="token-display">
            <div class="token-label">Your "Totally Real" Tokens</div>
            <div class="token-amount"><span id="tokenAmount">1000</span><span class="tokens-icon">💰</span></div>
        </div>

        <div class="machines-section">
            <!-- Machine 1: ChatGPT -->
            <div class="machine">
                <h3>ChatGPT's Casino</h3>
                <div class="slots">
                    <div class="slot" id="slot1-1">🤖</div>
                    <div class="slot" id="slot1-2">🤖</div>
                    <div class="slot" id="slot1-3">🤖</div>
                </div>
                <button class="spin-button" id="spinBtn1" onclick="spin(1)">SPIN</button>
            </div>

            <!-- Machine 2: Silicon Valley -->
            <div class="machine">
                <h3>The Hype Machine</h3>
                <div class="slots">
                    <div class="slot" id="slot2-1">💸</div>
                    <div class="slot" id="slot2-2">💸</div>
                    <div class="slot" id="slot2-3">💸</div>
                </div>
                <button class="spin-button" id="spinBtn2" onclick="spin(2)">SPIN</button>
            </div>
        </div>

        <div class="message-box">
            <div class="message" id="message">
                Ready to lose some tokens? AI is ready to help! 🚀
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Total Spins</div>
                <div class="stat-value" id="spinCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Times Fooled</div>
                <div class="stat-value" id="winCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Losses</div>
                <div class="stat-value" id="lossCount">0</div>
            </div>
        </div>

        <button class="reset-button" onclick="resetGame()">RESET EVERYTHING</button>
    </div>

    <script>
        // Game state
        let tokens = 1000;
        let spinCount = 0;
        let winCount = 0;
        let lossCount = 0;
        let isSpinning = false;

        const symbols = ['🤖', '💰', '🔥', '❌', '📈', '💎'];
        const costPerSpin = 10;

        const winMessages = [
            "🎉 YAY! You won some fake tokens that have zero real value!",
            "😱 OH NO! An AI predicted something correctly by accident!",
            "🎊 CONGRATULATIONS! You're now $50 richer in the metaverse!",
            "✨ WOW! The algorithm blessed you today!",
            "🚀 TO THE MOON! (Of made-up wealth!)",
            "💎 JACKPOT! AI actually did something useful!",
            "🤣 Even the AI can't believe you won!"
        ];

        const loseMessages = [
            "😅 Oops! The AI learned to take your money!",
            "💸 Another dollar for the tech overlords!",
            "🤖 The algorithm decided you're not profitable enough.",
            "📉 This is fine. Everything is fine.",
            "🎭 Just like real life, AI wins, you lose!",
            "🔮 The AI predicted you'd lose. It was right.",
            "😢 Your tokens have been 'optimized' away.",
            "🌭 Congratulations, you're now a hot dog!",
            "⚠️ ERROR 404: Your money not found."
        ];

        const aiRoasts = [
            "AI: I'll replace human jobs!",
            "Also AI: Can't figure out basic logic.",
            "Breaking: AI turns your hobby into a pyramid scheme",
            "Hot take: This slot machine has better odds than crypto",
            "Fun fact: Your data is worth more than your tokens",
            "The real AI was the tokens we lost along the way",
            "This is what peak machine learning looks like",
            "I'm afraid I can't do that, Dave... or hold your money",
            "Bandwidth well spent, my friend!",
            "Who needs ethics when you have gambling!",
            "This casino is 'augmented' intelligence",
            "Beware: Contains 0% real AI, 100% disappointment"
        ];

        function spin(machineId) {
            // Check if already spinning
            if (isSpinning) return;

            // Check if enough tokens
            if (tokens < costPerSpin) {
                showMessage("💸 Not enough tokens! Get a job like the rest of us!", "lose");
                return;
            }

            isSpinning = true;
            tokens -= costPerSpin;
            spinCount++;
            updateDisplay();

            // Disable buttons
            document.getElementById('spinBtn1').disabled = true;
            document.getElementById('spinBtn2').disabled = true;

            // Spin animation
            const slots = [
                document.getElementById(`slot${machineId}-1`),
                document.getElementById(`slot${machineId}-2`),
                document.getElementById(`slot${machineId}-3`)
            ];

            let spins = 0;
            const spinInterval = setInterval(() => {
                slots.forEach(slot => {
                    slot.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                    slot.classList.add('spinning');
                });
                spins++;

                if (spins > 20) {
                    clearInterval(spinInterval);
                    slots.forEach(slot => slot.classList.remove('spinning'));

                    // Set final results
                    const results = [
                        symbols[Math.floor(Math.random() * symbols.length)],
                        symbols[Math.floor(Math.random() * symbols.length)],
                        symbols[Math.floor(Math.random() * symbols.length)]
                    ];

                    slots.forEach((slot, index) => {
                        slot.textContent = results[index];
                    });

                    // Check for win
                    const isWin = results[0] === results[1] && results[1] === results[2];

                    if (isWin) {
                        const winAmount = costPerSpin * 5;
                        tokens += winAmount;
                        winCount++;
                        const message = winMessages[Math.floor(Math.random() * winMessages.length)];
                        showMessage(`${message}\n+${winAmount} tokens!`, 'win');
                    } else {
                        lossCount++;
                        const message = loseMessages[Math.floor(Math.random() * loseMessages.length)];
                        showMessage(message, 'lose');
                    }

                    updateDisplay();
                    isSpinning = false;
                    document.getElementById('spinBtn1').disabled = false;
                    document.getElementById('spinBtn2').disabled = false;
                }
            }, 50);
        }

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.classList.remove('win-message', 'lose-message');

            if (type === 'win') {
                messageEl.classList.add('win-message');
                playSound('win');
            } else {
                messageEl.classList.add('lose-message');
                playSound('lose');
            }
        }

        function updateDisplay() {
            document.getElementById('tokenAmount').textContent = tokens;
            document.getElementById('spinCount').textContent = spinCount;
            document.getElementById('winCount').textContent = winCount;
            document.getElementById('lossCount').textContent = lossCount;
        }

        function resetGame() {
            if (confirm('Reset your "fortune"? Are you sure you want to start over?\n\n(At least when AI resets, it forgets what it did wrong!)')) {
                tokens = 1000;
                spinCount = 0;
                winCount = 0;
                lossCount = 0;
                updateDisplay();
                showMessage("🎰 Fresh start! Let's lose money all over again!", 'win');
            }
        }

        function playSound(type) {
            // Use Web Audio API to play simple beeps
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                if (type === 'win') {
                    oscillator.frequency.value = 800;
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.2);
                } else {
                    oscillator.frequency.value = 300;
                    gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.1);
                }
            } catch (e) {
                // Audio context might not be available
            }
        }

        // Initialize display
        updateDisplay();
    </script>
</body>
</html>
