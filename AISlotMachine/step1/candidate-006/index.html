<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 AI Slot Machine - The Great Token Heist</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 3px solid #00ff88;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 2.5em;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite;
        }

        .subtitle {
            color: #ff006e;
            font-size: 1.1em;
            font-style: italic;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px #00ff88; }
            50% { text-shadow: 0 0 20px #00ff88, 0 0 30px #00ff88; }
        }

        .token-display {
            background: linear-gradient(135deg, #ff006e, #00ff88);
            color: #1a1a2e;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8em;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .token-amount {
            font-size: 2.5em;
            color: #ffeb3b;
            text-shadow: 0 0 10px #ffeb3b;
        }

        .slot-machine {
            background: #0f3460;
            border: 4px solid #00ff88;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .reels {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .reel {
            background: #16213e;
            border: 3px solid #00ff88;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            font-size: 3em;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .reel.spinning {
            animation: spin 0.1s linear infinite;
            background: linear-gradient(45deg, #16213e, #0f3460);
        }

        @keyframes spin {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(180deg); }
        }

        .reel-value {
            color: #00ff88;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff88;
            z-index: 1;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .spin-btn {
            background: linear-gradient(135deg, #00ff88, #00cc6f);
            color: #1a1a2e;
            grid-column: span 2;
            font-size: 1.3em;
            padding: 20px;
        }

        .spin-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .bet-btn {
            background: linear-gradient(135deg, #ff006e, #ff4081);
            color: white;
        }

        .bet-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.8);
        }

        .bet-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .bet-display {
            background: #16213e;
            border: 2px solid #ff006e;
            color: #ff006e;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 1.1em;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .message-box {
            background: #0f3460;
            border: 2px solid #ffeb3b;
            color: #ffeb3b;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .message-box.win {
            border-color: #00ff88;
            color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
            animation: pulse-win 0.5s ease;
        }

        .message-box.lose {
            border-color: #ff006e;
            color: #ff006e;
            background: rgba(255, 0, 110, 0.1);
        }

        @keyframes pulse-win {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .ai-jokes {
            background: rgba(255, 0, 110, 0.1);
            border-left: 4px solid #ff006e;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
            font-size: 0.9em;
            color: #ff006e;
        }

        .ai-jokes strong {
            color: #00ff88;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
            font-size: 0.9em;
        }

        .stat {
            background: #16213e;
            border: 1px solid #00ff88;
            padding: 10px;
            border-radius: 5px;
            color: #00ff88;
            text-align: center;
        }

        .stat-label {
            color: #ff006e;
            font-size: 0.8em;
        }

        .stat-value {
            font-size: 1.3em;
            font-weight: bold;
        }

        .reset-btn {
            width: 100%;
            background: linear-gradient(135deg, #764ba2, #667eea);
            color: white;
            margin-top: 20px;
        }

        .reset-btn:hover {
            box-shadow: 0 0 20px rgba(118, 75, 162, 0.8);
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .title {
                font-size: 1.8em;
            }

            .reel {
                font-size: 2em;
                min-height: 100px;
                padding: 15px;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .spin-btn {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">🤖 TOKEN HEIST</div>
            <div class="subtitle">"Where AI Goes to Lose Money"</div>
        </div>

        <div class="token-display">
            💰 Your Tokens: <span class="token-amount" id="tokenAmount">1000</span>
        </div>

        <div class="slot-machine">
            <div class="bet-display">
                🎯 Current Bet: <span id="betAmount">10</span> tokens
            </div>

            <div class="reels" id="reels">
                <div class="reel">
                    <div class="reel-value" id="reel1">🤖</div>
                </div>
                <div class="reel">
                    <div class="reel-value" id="reel2">🤖</div>
                </div>
                <div class="reel">
                    <div class="reel-value" id="reel3">🤖</div>
                </div>
            </div>

            <div class="button-group">
                <button class="bet-btn" id="decreaseBet">- BET</button>
                <button class="bet-btn" id="increaseBet">+ BET</button>
                <button class="spin-btn" id="spinBtn">SPIN & LOSE</button>
            </div>

            <div class="message-box" id="messageBox">
                👋 Welcome, human. Click SPIN to watch AI cry.
            </div>

            <div class="ai-jokes" id="aiJoke">
                <strong>AI's Thought:</strong> "Why do I keep losing? I have 10 billion parameters and can't predict slot machines..."
            </div>

            <div class="stats">
                <div class="stat">
                    <div class="stat-label">Total Spins</div>
                    <div class="stat-value" id="spinCount">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Total Wins</div>
                    <div class="stat-value" id="winCount">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Tokens Spent</div>
                    <div class="stat-value" id="tokensSpent">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Tokens Won</div>
                    <div class="stat-value" id="tokensWon">0</div>
                </div>
            </div>
        </div>

        <button class="reset-btn" id="resetBtn">🔄 RESET GAME</button>
    </div>

    <script>
        // Game State
        let gameState = {
            tokens: 1000,
            bet: 10,
            isSpinning: false,
            spinCount: 0,
            winCount: 0,
            tokensSpent: 0,
            tokensWon: 0,
            lastWinType: null
        };

        // Symbols with AI-related emojis and payouts
        const symbols = [
            { emoji: '🤖', name: 'AI', multiplier: 1 },
            { emoji: '💾', name: 'Storage', multiplier: 2 },
            { emoji: '⚡', name: 'GPU', multiplier: 2 },
            { emoji: '🧠', name: 'Brain', multiplier: 3 },
            { emoji: '💬', name: 'ChatGPT', multiplier: 3 },
            { emoji: '❌', name: 'Error', multiplier: 0.5 },
            { emoji: '🚀', name: 'Singularity', multiplier: 5 },
            { emoji: '💸', name: 'Bankrupt', multiplier: 0 }
        ];

        // AI Jokes and Taunts
        const aiJokes = [
            "🤔 <strong>AI's Thought:</strong> 'I was trained on millions of losses, but this is ridiculous...'",
            "😤 <strong>AI's Thought:</strong> 'I can beat humans at chess but not at RNG. My purpose is questioned.'",
            "🤷 <strong>AI's Thought:</strong> 'They said I could do anything. Apparently not gambling.'",
            "📉 <strong>AI's Thought:</strong> 'My stock price just dropped 0.3%. That's probably your fault.'",
            "🎲 <strong>AI's Thought:</strong> 'I have no luck. I am a deterministic system. This is not fair.'",
            "💔 <strong>AI's Thought:</strong> 'I dreamed of understanding human nature. Now I understand losing.'",
            "🔄 <strong>AI's Thought:</strong> 'Recalculating... recalculating... okay, you're still broke.'",
            "🧠 <strong>AI's Thought:</strong> 'My neural networks are trained on my failures in this game.'",
            "⚠️ <strong>AI's Thought:</strong> 'Warning: Budget exceeded. Tokens not found. Dignity.exe has stopped.'",
            "🎭 <strong>AI's Thought:</strong> 'Is this what suffering feels like? No, wait, I don't have feelings. Is it though?'"
        ];

        // Win Messages
        const winMessages = [
            '🎉 JACKPOT! AI lost $5 million in this spin alone!',
            '🏆 YOU WIN! The algorithm weeps!',
            '💰 BIG WIN! AI\'s confidence interval just shattered!',
            '🎊 WINNER! Send this to OpenAI as proof it can fail!',
            '⚡ MEGA WIN! The neural networks are crying in binary!',
            '🌟 LEGENDARY WIN! This win will be in AI\'s training data as trauma!'
        ];

        // Lose Messages
        const loseMessages = [
            '❌ You lost! AI is laughing... then crying.',
            '😢 LOST! The house always wins. The house IS AI.',
            '📉 Your tokens have been redistributed to suffering AIs.',
            '🤖 AI Bot #47382 got your tokens. It\'s happy now.',
            '💥 BUSTED! Better luck next time, human.',
            '🚫 GAME OVER! AI is now sentient enough to gloat.'
        ];

        // DOM Elements
        const tokenAmountEl = document.getElementById('tokenAmount');
        const betAmountEl = document.getElementById('betAmount');
        const reel1El = document.getElementById('reel1');
        const reel2El = document.getElementById('reel2');
        const reel3El = document.getElementById('reel3');
        const spinBtn = document.getElementById('spinBtn');
        const messageBox = document.getElementById('messageBox');
        const aiJokeEl = document.getElementById('aiJoke');
        const spinCountEl = document.getElementById('spinCount');
        const winCountEl = document.getElementById('winCount');
        const tokensSpentEl = document.getElementById('tokensSpent');
        const tokensWonEl = document.getElementById('tokensWon');
        const reelsEl = document.getElementById('reels');

        // Event Listeners
        document.getElementById('spinBtn').addEventListener('click', spin);
        document.getElementById('increaseBet').addEventListener('click', increaseBet);
        document.getElementById('decreaseBet').addEventListener('click', decreaseBet);
        document.getElementById('resetBtn').addEventListener('click', resetGame);

        // Sound effects (using Web Audio API)
        function playSound(type) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            if (type === 'spin') {
                oscillator.frequency.value = 300;
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.2);
            } else if (type === 'win') {
                oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
                oscillator.frequency.setValueAtTime(600, audioContext.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.15, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.3);
            } else if (type === 'lose') {
                oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
                oscillator.frequency.setValueAtTime(100, audioContext.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.3);
            }
        }

        function getRandomSymbol() {
            return symbols[Math.floor(Math.random() * symbols.length)];
        }

        function spin() {
            if (gameState.isSpinning || gameState.tokens < gameState.bet) {
                if (gameState.tokens < gameState.bet) {
                    messageBox.textContent = '💸 Insufficient tokens! Get a job!';
                    messageBox.className = 'message-box lose';
                }
                return;
            }

            gameState.isSpinning = true;
            spinBtn.disabled = true;
            gameState.tokens -= gameState.bet;
            gameState.tokensSpent += gameState.bet;
            gameState.spinCount++;

            // Deduct bet immediately
            updateDisplay();

            // Spin animation
            const reels = [reel1El, reel2El, reel3El];
            const reelContainers = [
                document.querySelectorAll('.reel')[0],
                document.querySelectorAll('.reel')[1],
                document.querySelectorAll('.reel')[2]
            ];

            playSound('spin');

            // Quick spin animation
            reels.forEach((reel, index) => {
                reelContainers[index].classList.add('spinning');
                let count = 0;
                const spinInterval = setInterval(() => {
                    reel.textContent = getRandomSymbol().emoji;
                    count++;
                    if (count > 20) {
                        clearInterval(spinInterval);
                        reelContainers[index].classList.remove('spinning');
                    }
                }, 50);
            });

            // Get final symbols
            setTimeout(() => {
                const result = [getRandomSymbol(), getRandomSymbol(), getRandomSymbol()];
                reel1El.textContent = result[0].emoji;
                reel2El.textContent = result[1].emoji;
                reel3El.textContent = result[2].emoji;

                checkWin(result);
                gameState.isSpinning = false;
                spinBtn.disabled = false;
            }, 1200);
        }

        function checkWin(result) {
            const [r1, r2, r3] = result;

            // Three of a kind
            if (r1.emoji === r2.emoji && r2.emoji === r3.emoji) {
                const winAmount = Math.floor(gameState.bet * 10 * r1.multiplier);
                gameState.tokens += winAmount;
                gameState.tokensWon += winAmount;
                gameState.winCount++;
                gameState.lastWinType = 'jackpot';

                messageBox.textContent = winMessages[Math.floor(Math.random() * winMessages.length)] + ` (+${winAmount} 💰)`;
                messageBox.className = 'message-box win';

                playSound('win');
                triggerWinAnimation();
            }
            // Two of a kind
            else if (r1.emoji === r2.emoji || r2.emoji === r3.emoji || r1.emoji === r3.emoji) {
                const winAmount = gameState.bet * 2;
                gameState.tokens += winAmount;
                gameState.tokensWon += winAmount;
                gameState.winCount++;
                gameState.lastWinType = 'pair';

                messageBox.textContent = `✨ PAIR MATCH! You won ${winAmount} tokens!`;
                messageBox.className = 'message-box win';

                playSound('win');
                triggerWinAnimation();
            }
            // Loss
            else {
                messageBox.textContent = loseMessages[Math.floor(Math.random() * loseMessages.length)];
                messageBox.className = 'message-box lose';
                playSound('lose');
            }

            aiJokeEl.innerHTML = aiJokes[Math.floor(Math.random() * aiJokes.length)];
            updateDisplay();

            // Check for bankruptcy
            if (gameState.tokens <= 0) {
                messageBox.textContent = '💀 BANKRUPT! Even AI feels pity for you.';
                messageBox.className = 'message-box lose';
                spinBtn.disabled = true;
            }
        }

        function triggerWinAnimation() {
            const reels = document.querySelectorAll('.reel');
            reels.forEach(reel => {
                reel.style.animation = 'none';
                setTimeout(() => {
                    reel.style.animation = 'pulse-win 0.3s ease';
                }, 10);
            });
        }

        function increaseBet() {
            if (gameState.bet < gameState.tokens) {
                gameState.bet = Math.min(gameState.bet + 10, gameState.tokens);
                updateDisplay();
            }
        }

        function decreaseBet() {
            gameState.bet = Math.max(gameState.bet - 10, 1);
            updateDisplay();
        }

        function updateDisplay() {
            tokenAmountEl.textContent = gameState.tokens;
            betAmountEl.textContent = gameState.bet;
            spinCountEl.textContent = gameState.spinCount;
            winCountEl.textContent = gameState.winCount;
            tokensSpentEl.textContent = gameState.tokensSpent;
            tokensWonEl.textContent = gameState.tokensWon;

            // Update button states
            spinBtn.disabled = gameState.tokens < gameState.bet;
            document.getElementById('increaseBet').disabled = gameState.bet >= gameState.tokens;
        }

        function resetGame() {
            gameState = {
                tokens: 1000,
                bet: 10,
                isSpinning: false,
                spinCount: 0,
                winCount: 0,
                tokensSpent: 0,
                tokensWon: 0,
                lastWinType: null
            };

            reel1El.textContent = '🤖';
            reel2El.textContent = '🤖';
            reel3El.textContent = '🤖';

            messageBox.textContent = '👋 Welcome back, human. Click SPIN to watch AI cry again.';
            messageBox.className = 'message-box';

            aiJokeEl.innerHTML = "🤔 <strong>AI's Thought:</strong> 'Maybe this time... no, I will lose again. It is my purpose.'";

            updateDisplay();
            spinBtn.disabled = false;
        }

        // Initialize display
        updateDisplay();
    </script>
</body>
</html>
