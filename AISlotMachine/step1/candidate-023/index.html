<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Slot Machine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI Token Slot Machine 🤖</h1>
            <p class="subtitle">Gamble your computational credits away!</p>
        </div>

        <div class="game-area">
            <div class="token-display">
                <div class="token-info">
                    <span class="label">Tokens:</span>
                    <span class="token-count" id="tokenCount">1000</span>
                </div>
            </div>

            <div class="machine">
                <div class="reels-container">
                    <div class="reel" id="reel1">
                        <div class="reel-item">🤖</div>
                        <div class="reel-item">💭</div>
                        <div class="reel-item">⚡</div>
                        <div class="reel-item">🧠</div>
                        <div class="reel-item">💰</div>
                        <div class="reel-item">🌐</div>
                        <div class="reel-item">🔮</div>
                    </div>
                    <div class="reel" id="reel2">
                        <div class="reel-item">🤖</div>
                        <div class="reel-item">💭</div>
                        <div class="reel-item">⚡</div>
                        <div class="reel-item">🧠</div>
                        <div class="reel-item">💰</div>
                        <div class="reel-item">🌐</div>
                        <div class="reel-item">🔮</div>
                    </div>
                    <div class="reel" id="reel3">
                        <div class="reel-item">🤖</div>
                        <div class="reel-item">💭</div>
                        <div class="reel-item">⚡</div>
                        <div class="reel-item">🧠</div>
                        <div class="reel-item">💰</div>
                        <div class="reel-item">🌐</div>
                        <div class="reel-item">🔮</div>
                    </div>
                </div>
                <div class="win-indicator" id="winIndicator">WIN!</div>
            </div>

            <div class="bet-controls">
                <label for="betAmount">Bet:</label>
                <input type="number" id="betAmount" min="1" max="500" value="10">
                <span class="tokens-label">tokens</span>
            </div>

            <button class="spin-button" id="spinButton">SPIN</button>

            <div class="message-display" id="messageDisplay">
                Click SPIN to test your luck...
            </div>

            <div class="stats">
                <div class="stat">
                    <span class="stat-label">Spins:</span>
                    <span class="stat-value" id="spinCount">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Wins:</span>
                    <span class="stat-value" id="winCount">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Balance:</span>
                    <span class="stat-value" id="balanceDisplay">+0</span>
                </div>
            </div>

            <button class="reset-button" id="resetButton">Reset Game</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
